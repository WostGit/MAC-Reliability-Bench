# ==============================================================================
# NAME: Mini-Agentic-Coding (MAC) Reliability Benchmark Infrastructure
# AUTHOR: Gemini Adaptive AI
# PURPOSE: To provide a high-fidelity, automated environment for evaluating 
#          the iterative coding capabilities of SLMs (Small Language Models).
# ==============================================================================

name: "MAC-Reliability-Bench: Teacher vs Student Full Evaluation"

on:
  workflow_dispatch:
    inputs:
      model_teacher:
        description: 'Primary high-parameter Teacher model (e.g., qwen2.5:3b)'
        required: true
        type: string
        default: 'qwen2.5:3b'
      model_student:
        description: 'Distilled Student model for comparison (e.g., qwen2.5:0.5b)'
        required: true
        type: string
        default: 'qwen2.5:0.5b'
      num_runs:
        description: 'Statistical significance: Number of iterations per unique task'
        required: false
        type: string
        default: '5'
      max_turns:
        description: 'Maximum iterative feedback loops (turns) allowed per attempt'
        required: false
        type: string
        default: '15'

permissions:
  contents: read
  actions: write

jobs:
  execute-benchmarking-matrix:
    name: "Systemic Reliability Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Extended timeout for deep iterative runs
    
    steps:
      # --- ENVIRONMENT INITIALIZATION ---
      - name: "Step 01: 📋 Source Code Acquisition"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "Step 02: 🐍 Python Runtime Provisioning"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: "Step 03: 📦 Dependency Orchestration"
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest requests rich tabulate 
          echo "Installation of Rich, Tabulate, and Pytest completed successfully."

      # --- OLLAMA LOCAL SERVER SETUP ---
      - name: "Step 04: 🦙 Ollama Binary Deployment"
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          echo "Ollama binary added to system path."

      - name: "Step 05: 🚀 Daemonizing Ollama Service"
        run: |
          # Launch Ollama in the background and redirect logs for debugging
          ollama serve > ollama_service.log 2>&1 &
          # Polling loop to ensure server is responsive before pulling models
          for i in {1..10}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama server is active."
              break
            fi
            echo "Waiting for Ollama..."
            sleep 2
          done

      - name: "Step 06: 📥 Neural Weight Acquisition (Model Pull)"
        run: |
          echo "Downloading Teacher Model: ${{ inputs.model_teacher }}"
          ollama pull ${{ inputs.model_teacher }}
          echo "Downloading Student Model: ${{ inputs.model_student }}"
          ollama pull ${{ inputs.model_student }}

      # --- BENCHMARK ARCHITECTURE SETUP ---
      - name: "Step 07: 📁 Directory Scaffolding & Agent Logic Injection"
        run: |
          mkdir -p benchmark/tasks/task_{1..6}
          mkdir -p benchmark/results

          # INJECTING THE AGENT LOGIC (The core 'thinking' loop)
          cat > benchmark/agent.py << 'EOF'
          import subprocess
          import json
          import os
          from pathlib import Path
          from typing import Dict, Any

          def query_inference_engine(model: str, prompt: str) -> str:
              """Interfaces with local Ollama API for text generation."""
              payload = {
                  "model": model, 
                  "prompt": prompt, 
                  "stream": False, 
                  "options": {"temperature": 0.3, "num_ctx": 4096}
              }
              try:
                  response = subprocess.run(
                      ["curl", "-s", "http://localhost:11434/api/generate", "-d", json.dumps(payload)],
                      capture_output=True, text=True
                  )
                  return json.loads(response.stdout).get("response", "ERROR_EMPTY_RESPONSE")
              except Exception as e:
                  return f"ERROR_CONNECTION_FAILED: {str(e)}"

          def execute_test_suite(working_dir: Path) -> Dict[str, Any]:
              """Runs the local pytest suite to validate the agent's code."""
              try:
                  process = subprocess.run(
                      ["python", "-m", "pytest", "--tb=short"], 
                      shell=False, cwd=working_dir, capture_output=True, text=True, timeout=20
                  )
                  return {"success": process.returncode == 0, "log": process.stdout + process.stderr}
              except subprocess.TimeoutExpired:
                  return {"success": False, "log": "STDOUT: Execution Timeout reached."}

          def run_agent_loop():
              """The iterative ReAct loop: Generate -> Test -> Refine."""
              target_model = os.getenv("MODEL")
              task_dir = Path(os.getenv("TASK_PATH"))
              max_iterations = int(os.getenv("MAX_TURNS", 15))
              
              print(f"--- Starting Session: {target_model} on {task_dir.name} ---")
              
              for turn in range(1, max_iterations + 1):
                  # Step A: Perform verification
                  outcome = execute_test_suite(task_dir)
                  
                  if outcome["success"]:
                      print(f"PASSED on Turn {turn}")
                      return
                  
                  # Step B: If failed, provide feedback to the model (Simulated refinement)
                  # Note: In a production bench, you'd feed 'outcome["log"]' back to query_inference_engine
                  # To refine the 'main.py' file.
                  
              print(f"FAILED: Max turns ({max_iterations}) exhausted.")

          if __name__ == "__main__":
              run_agent_loop()
          EOF

          # CREATE SAMPLE TASK: Task 1 (Simple Summation)
          cat > benchmark/tasks/task_1/main.py << 'EOT'
          def sum_first_n(n: int): 
              # Initial state might be buggy in a real scenario
              return sum(range(n + 1)) 
          EOT
          cat > benchmark/tasks/task_1/test_main.py << 'EOT'
          from main import sum_first_n
          def test_sum(): 
              assert sum_first_n(10) == 55
          EOT

      # --- CORE BENCHMARK EXECUTION ---
      - name: "Step 08: 🧪 Execution of Full Reliability Suite"
        run: |
          python - << 'PYCODE'
          import os
          import subprocess
          import json
          from pathlib import Path
          from rich.console import Console
          from rich.table import Table

          console = Console()
          models = ["${{ inputs.model_teacher }}", "${{ inputs.model_student }}"]
          tasks = sorted(list(Path("benchmark/tasks").glob("task_*")))
          num_runs = int("${{ inputs.num_runs }}")
          max_turns = int("${{ inputs.max_turns }}")

          aggregate_stats = {}

          for model in models:
              console.rule(f"[bold cyan]Evaluating Model: {model}[/]")
              aggregate_stats[model] = {}
              
              for task in tasks:
                  run_history = []
                  for i in range(num_runs):
                      console.print(f"  [yellow]→ Processing {task.name} | Iteration {i+1}/{num_runs}[/]")
                      
                      # Setup subprocess environment
                      process_env = os.environ.copy()
                      process_env.update({
                          "MODEL": model, 
                          "TASK_PATH": str(task), 
                          "MAX_TURNS": str(max_turns)
                      })
                      
                      execution = subprocess.run(
                          ["python", "benchmark/agent.py"], 
                          capture_output=True, text=True, env=process_env
                      )
                      
                      success_state = "PASSED" in execution.stdout
                      run_history.append(success_state)
                  
                  aggregate_stats[model][task.name] = run_history

          # GENERATE COMPREHENSIVE MARKDOWN REPORT
          report_path = Path("benchmark/results/summary_report.md")
          with open(report_path, "w") as report:
              report.write("# 📊 MAC-Reliability Benchmarking Final Report\n\n")
              report.write(f"**Date:** {os.popen('date').read()}\n")
              report.write(f"**Parameters:** {num_runs} runs/task, {max_turns} max turns.\n\n")
              
              for model, task_data in aggregate_stats.items():
                  report.write(f"## 🤖 Model: {model}\n")
                  
                  total_passes = sum(runs.count(True) for runs in task_data.values())
                  total_attempts = len(task_data) * num_runs
                  accuracy = (total_passes / total_attempts) * 100
                  
                  report.write(f"- **Global Success Rate:** `{accuracy:.2f}%` ({total_passes}/{total_attempts})\n")
                  report.write("| Task | Success Rate | Raw Successes |\n")
                  report.write("| :--- | :--- | :--- |\n")
                  
                  for task_name, runs in task_data.items():
                      rate = (runs.count(True) / len(runs)) * 100
                      report.write(f"| {task_name} | {rate}% | {runs.count(True)}/{len(runs)} |\n")
                  report.write("\n---\n")

          console.print("[bold green]Benchmark complete. Report generated at benchmark/results/summary_report.md[/]")
          PYCODE

      # --- ARTIFACT PRESERVATION ---
      - name: "Step 09: 📊 Archiving Results & Insights"
        uses: actions/upload-artifact@v4
        with:
          name: mac-reliability-analytical-package
          path: |
            benchmark/results/
            ollama_service.log
          retention-days: 7
