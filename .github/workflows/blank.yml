name: MAC-Reliability-Bench - MLX on macOS 26

on:
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        description: 'Teacher model (mlx-community)'
        required: false
        default: 'mlx-community/Qwen2.5-3B-Instruct-4bit'
      model_student_hf:
        description: 'Student model (mlx-community)'
        required: false
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-4bit'
      num_runs:
        description: 'Runs per task'
        required: false
        default: '5'
      max_turns:
        description: 'Max agent turns per run'
        required: false
        default: '12'

jobs:
  benchmark:
    runs-on: macos-26
    timeout-minutes: 150

    steps:
      - name: 📋 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlx-lm pyyaml pytest requests rich tabulate

      - name: 🔧 Cache MLX models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: mlx-qwen25-${{ inputs.model_teacher_hf }}-${{ inputs.model_student_hf }}

      - name: 📁 Setup Benchmark Tasks
        shell: bash
        run: |
          mkdir -p benchmark/tasks/task_{1..8}
          
          # Generate the Agent Script
          cat > agent_mlx.py << 'AGENTEOF'
          import subprocess, json, re, time
          from pathlib import Path
          from typing import Dict, List
          from mlx_lm import load, generate

          models_cache = {}

          def get_model(model_id: str):
              if model_id not in models_cache:
                  models_cache[model_id] = load(model_id)
              return models_cache[model_id]

          def query_model(model_id: str, prompt: str):
              model, tokenizer = get_model(model_id)
              return generate(model, tokenizer, prompt=prompt, max_tokens=2048, verbose=False)

          def run_command(cmd: str, cwd: Path):
              try:
                  r = subprocess.run(cmd, shell=True, cwd=cwd, capture_output=True, text=True, timeout=20)
                  return {"success": r.returncode == 0, "output": r.stdout + r.stderr}
              except Exception as e:
                  return {"success": False, "output": str(e)}

          def run_agent(model_id: str, issue: str, repo_path: Path, max_turns: int):
              history = []
              start = time.time()
              for turn in range(max_turns):
                  prompt = f"Fix this: {issue}. Current files: {list(repo_path.glob('*.py'))}. Reply in JSON."
                  resp = query_model(model_id, prompt)
                  try:
                      action = json.loads(re.search(r'\{.*\}', resp, re.DOTALL).group(0))
                  except:
                      action = {"action": "error"}
                  
                  if action.get("action") == "edit":
                      (repo_path / "main.py").write_text(action.get("content", ""))
                  elif action.get("action") == "submit":
                      res = run_command("python -m pytest", repo_path)
                      return {"success": res["success"], "turns": turn+1, "time": time.time()-start}
              return {"success": False, "turns": max_turns, "time": time.time()-start}
          AGENTEOF

          # Generate dummy tasks
          for i in {1..8}; do
            cat > "benchmark/tasks/task_$i/main.py" << EOF
          def compute(x): return x * 1 # Bug
          EOF
            cat > "benchmark/tasks/task_$i/test_main.py" << EOF
          from main import compute
          def test_compute(): assert compute(5) == 10
          EOF
          done

      - name: 🧪 Run & Stream Results
        run: |
          python - << 'PYCODE'
          import json, sys
          from pathlib import Path
          from rich.console import Console
          from rich.table import Table
          from rich.panel import Panel
          import agent_mlx as agent

          console = Console()
          teacher = "${{ inputs.model_teacher_hf }}"
          student = "${{ inputs.model_student_hf }}"
          num_runs = int("${{ inputs.num_runs }}")
          max_turns = int("${{ inputs.max_turns }}")
          tasks = sorted(Path("benchmark/tasks").glob("task_*"))

          results = {teacher: {}, student: {}}

          for model in [teacher, student]:
              console.rule(f"[bold magenta]Evaluating: {model}[/]")
              for task in tasks:
                  run_outcomes = []
                  for r in range(num_runs):
                      res = agent.run_agent(model, "Fix the compute function", task, max_turns)
                      run_outcomes.append(res)
                      status = "[green]✔[/]" if res["success"] else "[red]✘[/]"
                      console.print(f"  {task.name} Run {r+1}: {status}")
                  results[model][task.name] = run_outcomes

          # Generate Final Console Report
          console.print("\n")
          console.rule("[bold cyan]FINAL COMPARISON REPORT[/]")
          
          table = Table(title="Model Reliability Baseline", show_header=True, header_style="bold")
          table.add_column("Task ID", style="dim")
          table.add_column(f"Teacher ({teacher})", justify="center")
          table.add_column(f"Student ({student})", justify="center")
          table.add_column("Status", justify="right")

          for task in [t.name for t in tasks]:
              t_pass = sum(1 for r in results[teacher][task] if r["success"])
              s_pass = sum(1 for r in results[student][task] if r["success"])
              
              diff = ""
              if t_pass > s_pass:
                  diff = "[yellow]Student Lagging[/]"
              elif t_pass == s_pass and t_pass > 0:
                  diff = "[green]Matched[/]"
              else:
                  diff = "[red]Baseline Failure[/]"

              table.add_row(
                  task, 
                  f"{t_pass}/{num_runs}", 
                  f"{s_pass}/{num_runs}", 
                  diff
              )

          console.print(table)
          
          t_total = sum(sum(1 for r in tasks_runs if r["success"]) for tasks_runs in results[teacher].values())
          s_total = sum(sum(1 for r in tasks_runs if r["success"]) for tasks_runs in results[student].values())
          total_poss = len(tasks) * num_runs

          console.print(Panel(
              f"[bold]Aggregate Score[/]\n"
              f"Teacher Baseline: {t_total}/{total_poss} ({ (t_total/total_poss)*100:.1f}%)\n"
              f"Student Performance: {s_total}/{total_poss} ({ (s_total/total_poss)*100:.1f}%)",
              title="Summary", expand=False
          ))
          PYCODE

